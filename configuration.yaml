
# Loads default set of integrations. Do not remove.
default_config:

# Dropdown for combined radar Lovelace dashboard (dashboards/radar_combined.yaml)
input_select:
  radar_dashboard_location:
    name: Radar location
    icon: mdi:radar
    options:
      - "Hal"
      - "Werkkamer"
    initial: "Hal"

lovelace:
  dashboards:
    radar-combined:
      mode: yaml
      title: Radars (combi)
      icon: mdi:radar
      show_in_sidebar: true
      require_admin: true
      filename: dashboards/radar_combined.yaml

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml
