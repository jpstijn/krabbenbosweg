####################################################################################

# [strapping] pins GPIO 2 [RTC], GPIO 8  (Must be HIGH during reset in all cases)
# GPIO 9 - [internal PU] [strapping]  Works as normal GPIOs after reset
# GPIO 20 - RxD , GPIO 21 - TxD for UART download and logs

uart:
  tx_pin: GPIO4
  rx_pin: GPIO3
  baud_rate: 256000
  parity: NONE
  stop_bits: 1

