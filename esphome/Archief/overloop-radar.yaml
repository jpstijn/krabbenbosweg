substitutions:
  # Set the device name
  name: "overloop-radar"
  # Set the friendly name
  friendly_name: Overloop Radar
  # 160000000L of 80000000L = 80Mhz of 160Mhz Cpu frequentie
  f_cpu: 80000000L  
  # I define each device with its own static IP.
  #ip_address: 192.168.1.231


packages:
  common: !include Common/common-esp32.yaml
  # gebruik Arduino library
  esp32-c3-arduino: !include Common/esp32-c3-arduino.yaml
  # gebruik ESP-IDF an alternative base framework for ESP32 chips;
  # it is recommended for variants of the ESP32 like ESP32S2, ESP32S3, ESP32C3 and single-core ESP32 chips.
#  esp32-c3-idf: !include Common/esp32-c3-idf.yaml
#  ble_tracker-proxy: !include Common/ble_tracker-proxy.yaml
# web server aanzetten of uit met #
#  web-server: !include Common/web-server.yaml

