substitutions:
  name: seeed-ld2412-t
  friendly_name: Seeed ld2412 T

  # 160000000L of 80000000L = 80Mhz of 160Mhz Cpu frequentie
  f_cpu: 80000000L  

packages:
  common: !include Common/common-esp32.yaml

  esp32-c6-idf: !include Common/esp32-c6.yaml
# web server aanzetten of uit met #
#  web-server: !include Common/web-server.yaml
#  einde vaste standaard project template yaml deel
####################################################################################

    
uart:
  tx_pin: GPIO16
  rx_pin: GPIO17
  baud_rate: 115200
  parity: NONE
  stop_bits: 1
  id: serial

    

ld2412:
  uart_id: serial

binary_sensor:
  - platform: ld2412
    has_target:
      name: Presence
    has_moving_target:
      name: Moving Target
    has_still_target:
      name: Still Target
    dynamic_background_correction_status:
      name: Dynamic Background Correction Status

switch:
