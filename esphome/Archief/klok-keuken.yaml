    id: my_font
    size: 24
  - file: 'Roboto-Regular.ttf'
    id: font1
    size: 8
  - file: 'BebasNeue-Regular.ttf'
    id: font2
    size: 64
  - file: 'arial.ttf'
    id: font3
    size: 24
  - file: 'arial.ttf'
    id: font4
    size: 28
  - file: 'arial.ttf'
    id: font5
    size: 32
  - file: 'arial.ttf'
    id: font6
    size: 66
  - file: 'slkscr.ttf'
    id: font7
    size: 32
  - file: 'UniversLightCondensed.ttf'
    id: font8
    size: 66   

binary_sensor:
  - platform: gpio
    name: "Knop 1"
    id: Knop_1
    filters:
    - delayed_on_off:
        time_on: 530ms
        time_off: 530ms
    pin:
      number: GPIO4
      mode:
        input: true
    on_press:
      then:
       - display.page.show: page1
       - component.update: my_display
       - switch.turn_on: feedback
  - platform: gpio
    name: "Knop 2"
    filters:
    - delayed_on_off:
        time_on: 530ms
        time_off: 530ms
    pin:
      number: GPIO3
      mode:
        input: true
    on_press:
      then:
       - display.page.show: page2
       - component.update: my_display
       - switch.turn_on: feedback
  - platform: gpio
    name: "Knop 3"
    filters:
    - delayed_on_off:
        time_on: 530ms
        time_off: 530ms
    pin:
      number: GPIO1
      mode:
        input: true
    on_press:
      then:
       - display.page.show: page3
       - component.update: my_display
       - switch.turn_on: feedback
  - platform: gpio
    name: "Knop 4"
    filters:
    - delayed_on_off:
        time_on: 530ms
        time_off: 530ms
    pin:
      number: GPIO0
      mode:
        input: true
    on_press:
      then:
       - display.page.show: page4
       - component.update: my_display
       - switch.turn_on: feedback

switch:
  - platform: gpio
    pin: GPIO20
    id: feedback
    name: "Feedback"
    icon: "mdi:gate"
    on_turn_on:
    - delay: 250ms
    - switch.turn_off: feedback




button:
  - platform: template
    id: virt
    name: "Display-Text"
    on_press:
      - display.page.show: page3
      - component.update: my_display 
  - platform: template
    name: "Display-Off"
    on_press:
      - display.page.show: page4
      - component.update: my_display
  - platform: template
    name: "Time"
    on_press:
      - display.page.show: page1
      - component.update: my_display
  - platform: template
    name: "Date"
    on_press:
      - display.page.show: page2
      - component.update: my_display




