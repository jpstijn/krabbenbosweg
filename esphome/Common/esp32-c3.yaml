esphome:
  name: $name
  friendly_name: $friendly_name
  platformio_options:
    board_build.flash_mode: dio
  # 160000000L of 80000000L = 80Mhz of 160Mhz Cpu frequentie
  #f_cpu: 80000000L  
    board_build.f_cpu: 80000000L
  name_add_mac_suffix: false


esp32:
   board: esp32-c3-devkitm-1
   framework:
     type: esp-idf

# https://esphome.io/components/wifi
wifi:
    ssid: !secret wifi_ssid
    password: !secret wifi_password
    domain: .local
# bij rename ip nummer gebruiken om WIFI OTA update te doen
#    use_address: 192.168.1.103
    use_address: ${name}.local
    power_save_mode: NONE
#    fast_connect: true
    fast_connect: false
    enable_on_boot: true
    reboot_timeout: 5min
    ap:
        ssid: "esp32-c3-Fallback"
        password: ""
        ap_timeout: 120s
    on_disconnect:
        then:
            - lambda: |-
                id(_wifi_disconnects_since_boot)++;

captive_portal:


#The mdns component makes the node announce itself on the local network using the multicast DNS (mDNS) protocol.
mdns:


# Enable Home Assistant API  
api:
  # https://esphome.io/components/api

# Allow Over-The-Air updates
ota:
   # https://esphome.io/components/ota
  - platform: esphome
    password: !secret ota_password

# Enable logging
logger:
    level: DEBUG  

# Enable logging (Default = DEBUG)

# Get the time from Home Assistant to sync the onboard real-time-clock.  
time:
  - platform: homeassistant
    id: homeassistant_time

#Exposes configuration and status sensors
sensor:
  - platform: uptime
    name: "Uptime"
    type: timestamp
    entity_category: diagnostic
    #Device Memory
  - platform: template
    id: esp_memory
    icon: mdi:memory
    name: ESP Free Memory
    lambda: return heap_caps_get_free_size(MALLOC_CAP_INTERNAL) / 1024;
    unit_of_measurement: "kB"
    state_class: measurement
    entity_category: "diagnostic"
    #Device Temperature
  - platform: internal_temperature
    name: "Internal Temp"
    unit_of_measurement: °C
    device_class: TEMPERATURE
    entity_category: "diagnostic"
    update_interval: 60s
    #Device RSSI
  - platform: wifi_signal
    name: "Wi‑Fi RSSI"
    id: wifi_signal_db
    update_interval: 60s
    entity_category: "diagnostic"
  - platform: template
    name: "Wi‑Fi Disconnects (since boot)"
    id: wifi_disconnects_since_boot_sensor
    entity_category: diagnostic
    accuracy_decimals: 0
    update_interval: 30s
    lambda: |-
        return id(_wifi_disconnects_since_boot);

# Globals (since-boot only; not restored)
globals:
    - id: _wifi_disconnects_since_boot
      type: int
      restore_value: no
      initial_value: '0'


# laat de wifi info zien
text_sensor:
    - platform: wifi_info
      ip_address:
          name: "IP"
          id: esp_ip_address
          icon: mdi:ip-network
          entity_category: diagnostic
      bssid:
          name: "BSSID"
          id: bssid_sensor
          entity_category: diagnostic
    - platform: template
      name: "Access Point Name"
      id: ap_name
      lambda: |-
        if (id(bssid_sensor).state == "3C:78:95:82:CD:F7") {
          return {"Werkkamer AP"};
        } else if (id(bssid_sensor).state == "3C:78:95:82:CE:4C") {
          return {"Kelder AP"};
        } else {
          return {"Unknown AP"};
        }
      icon: "mdi:router-wireless"
      entity_category: diagnostic
      update_interval: 120s

#Exposes control buttons
button:
  - platform: restart
    icon: mdi:power-cycle
    name: "ESP Reboot"
  - platform: factory_reset
    disabled_by_default: True
    name: "Factory Reset ESP"
    id: factory_reset_all
 




