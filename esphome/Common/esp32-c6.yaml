esp32:
  board: esp32-c6-devkitc-1
  variant: esp32c6
  framework:
    type: esp-idf

esphome:
    name: ${name}
    friendly_name: ${friendly_name}

logger:
    level: DEBUG  
    baud_rate: 115200
    hardware_uart: USB_SERIAL_JTAG

api:
#    encryption:
#        key: ${api_key}
    reboot_timeout: 15min

ota:
    - platform: esphome
      password: !secret ota_password
#      password: ${ota_password}
      version: 2

wifi:
    ssid: !secret wifi_ssid
    password: !secret wifi_password
    domain: .local
    use_address: ${name}.local
    power_save_mode: NONE
#    fast_connect: true
    fast_connect: false
    enable_on_boot: true
    reboot_timeout: 10min
    ap:
        ssid: "${friendly_name} Fallback"
        password: !secret wifi_captive
        ap_timeout: 120s
    on_disconnect:
        then:
            - lambda: |-
                id(_wifi_disconnects_since_boot)++;

captive_portal:

mdns:

# Status LED on Seeed XIAO ESP32-C6 (GPIO15, not inverted to match your working config)
status_led:
    pin:
      number: GPIO15

#output:
#  - platform: gpio
#    pin: 15
#    id: status_led

light:
    - platform: esp32_rmt_led_strip
      chipset: WS2812
      pin: GPIO8
      num_leds: 1
      rgb_order: GRB
      name: "Onboard RGB LED"


# Text sensors
text_sensor:
    - platform: wifi_info
      ip_address:
          name: "IP"
          icon: mdi:ip-network
          entity_category: diagnostic
#      mac_address:
#          name: "MAC"
#          entity_category: diagnostic
#      ssid:
#          name: "SSID"
#          entity_category: diagnostic
      bssid:
          name: "BSSID"
          id: bssid_sensor
          entity_category: diagnostic
    - platform: template
      name: "Access Point Name"
      id: ap_name
      lambda: |-
        if (id(bssid_sensor).state == "1A:5A:95:A4:24:CC") {
          return {"Kantoor AP"};
        } else if (id(bssid_sensor).state == "1A:5A:95:A4:47:1C") {
          return {"Keuken AP"};
        } else if (id(bssid_sensor).state == "E2:09:0D:6D:13:82") {
          return {"Zolder AP"};
        } else if (id(bssid_sensor).state == "EA:09:0D:6D:14:7C") {
          return {"Garage AP"};
        } else if (id(bssid_sensor).state == "F2:09:0D:6C:DA:E6") {
          return {"Slaapkamer AP"};
        } else {
          return {"Unknown AP"};
        }
      icon: "mdi:router-wireless"
      entity_category: diagnostic
      update_interval: 120s

# Buttons
button:
    - platform: restart
      name: "Restart Device"

# Basics + Wi‑Fi disconnect count (since boot)
sensor:
    - platform: internal_temperature
      name: "Internal Temp"
      entity_category: diagnostic

    - platform: uptime
      name: "Uptime"
      unit_of_measurement: "h"
      accuracy_decimals: 2
      update_interval: 60s
      filters:
          - lambda: return x / 3600.0;
      entity_category: diagnostic

    - platform: wifi_signal
      id: wifi_signal_dbm
      name: "Wi‑Fi RSSI"
      update_interval: 120s
      entity_category: diagnostic

    - platform: template
      name: "Wi‑Fi Disconnects (since boot)"
      id: wifi_disconnects_since_boot_sensor
      entity_category: diagnostic
      accuracy_decimals: 0
      update_interval: 120s
      lambda: |-
          return id(_wifi_disconnects_since_boot);

# Globals (since-boot only; not restored)
globals:
    - id: _wifi_disconnects_since_boot
      type: int
      restore_value: no
      initial_value: '0'


# Get the time from Home Assistant to sync the onboard real-time-clock. (Mark)  
time:
  - platform: homeassistant
    id: homeassistant_time
